apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  selector:
    app: mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: localstack
spec:
  selector:
    app: localstack
  ports:
    - protocol: TCP
      port: 4566
      targetPort: 4566

---
apiVersion: v1
kind: Service
metadata:
  name: registro-voti-api
spec:
  type: NodePort
  selector:
    app: registro-voti-api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000