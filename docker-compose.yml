services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    restart: always
    privileged: true
    user: root
    ports:
      - 8080:8080
      - 50000:50000
    container_name: jenkins
    volumes:
      - jenkins-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  
volumes:
  jenkins-home: